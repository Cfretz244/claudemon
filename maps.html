<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claudemon - Map Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-abyss: #06090d;
      --bg-deep: #0b1018;
      --bg-panel: #0f1620;
      --bg-card: #141e2c;
      --bg-card-hover: #1a2838;
      --border: #1e2e42;
      --border-active: #2a6a8a;
      --text: #8898a8;
      --text-dim: #4a5a6a;
      --text-bright: #c8d8e8;
      --text-white: #e8f0f8;
      --accent: #2a9ad4;
      --accent-glow: #40b8f0;
      --accent-dim: #1a6a94;
      --warp-external: #e8a020;
      --warp-external-glow: #f0c040;
      --warp-internal: #30c898;
      --warp-internal-glow: #50e8b8;
      --npc-color: #d060a0;
      --npc-glow: #f080c0;
      --trainer-color: #e04848;
      --trainer-glow: #f06868;
      --grid-line: rgba(40, 80, 120, 0.12);
      --grid-line-strong: rgba(40, 80, 120, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-abyss);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar h1 {
      font-family: 'Silkscreen', monospace;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(42, 154, 212, 0.3);
    }
    .topbar .sep {
      width: 1px;
      height: 20px;
      background: var(--border);
    }
    .topbar .tag {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--bg-abyss);
      background: var(--accent);
      padding: 2px 8px;
      border-radius: 2px;
    }
    .topbar .map-count {
      font-size: 11px;
      color: var(--text-dim);
    }
    .topbar .map-count span {
      color: var(--text);
      font-weight: 500;
    }
    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .zoom-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      font-family: 'IBM Plex Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .zoom-btn:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-dim);
      color: var(--text-bright);
    }
    .zoom-label {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 36px;
      text-align: center;
    }
    .toggle-group {
      display: flex;
      gap: 2px;
    }
    .toggle-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.5px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn:first-child { border-radius: 3px 0 0 3px; }
    .toggle-btn:last-child { border-radius: 0 3px 3px 0; }
    .toggle-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--text-white);
    }
    .toggle-btn:hover:not(.active) {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    /* Main layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--bg-deep);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-search {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 7px 10px;
      background: var(--bg-abyss);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-bright);
      outline: none;
      transition: border-color 0.15s;
    }
    .sidebar-search input:focus {
      border-color: var(--accent);
    }
    .sidebar-search input::placeholder {
      color: var(--text-dim);
    }
    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }
    .sidebar-group {
      margin-bottom: 4px;
    }
    .sidebar-group-header {
      padding: 6px 14px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }
    .sidebar-group-header:hover {
      color: var(--text);
    }
    .sidebar-group-header .arrow {
      font-size: 8px;
      transition: transform 0.2s;
    }
    .sidebar-group-header .arrow.collapsed {
      transform: rotate(-90deg);
    }
    .sidebar-group-header .count {
      margin-left: auto;
      font-size: 9px;
      color: var(--text-dim);
      font-weight: 400;
    }
    .sidebar-group-items {
      overflow: hidden;
    }
    .sidebar-group-items.collapsed {
      display: none;
    }
    .map-item {
      padding: 5px 14px 5px 24px;
      font-size: 11px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 2px solid transparent;
    }
    .map-item:hover {
      background: var(--bg-card);
      color: var(--text-bright);
    }
    .map-item.active {
      background: rgba(42, 154, 212, 0.08);
      border-left-color: var(--accent);
      color: var(--accent-glow);
    }
    .map-item .map-size {
      margin-left: auto;
      font-size: 9px;
      color: var(--text-dim);
    }
    .map-item .warp-count {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 8px;
      background: rgba(42, 154, 212, 0.1);
      color: var(--accent);
    }

    /* Main canvas area */
    .canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at center, rgba(42, 154, 212, 0.03) 0%, transparent 70%),
        var(--bg-abyss);
    }
    .canvas-area canvas {
      position: absolute;
      top: 0;
      left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Info panel (right) */
    .info-panel {
      width: 300px;
      background: var(--bg-deep);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .info-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .info-header .map-name {
      font-family: 'Silkscreen', monospace;
      font-size: 13px;
      color: var(--text-white);
      letter-spacing: 1px;
    }
    .info-header .map-id {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .info-header .map-dims {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .info-header .map-dims span {
      color: var(--text);
    }
    .info-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .info-section-title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }
    .warp-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .warp-entry {
      padding: 6px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .warp-entry:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-active);
    }
    .warp-entry.external {
      border-left: 3px solid var(--warp-external);
    }
    .warp-entry.internal {
      border-left: 3px solid var(--warp-internal);
    }
    .warp-entry .warp-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .warp-entry.external .warp-dot {
      background: var(--warp-external);
      box-shadow: 0 0 6px rgba(232, 160, 32, 0.5);
    }
    .warp-entry.internal .warp-dot {
      background: var(--warp-internal);
      box-shadow: 0 0 6px rgba(48, 200, 152, 0.5);
    }
    .warp-info {
      flex: 1;
      min-width: 0;
    }
    .warp-info .warp-target {
      font-size: 11px;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .warp-info .warp-coords {
      font-size: 9px;
      color: var(--text-dim);
    }
    .warp-arrow {
      color: var(--text-dim);
      font-size: 12px;
      flex-shrink: 0;
    }

    /* NPC list */
    .npc-entry {
      padding: 4px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
    }
    .npc-entry .npc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .npc-entry .npc-dot.trainer {
      background: var(--trainer-color);
      box-shadow: 0 0 4px rgba(224, 72, 72, 0.5);
    }
    .npc-entry .npc-dot.normal {
      background: var(--npc-color);
      box-shadow: 0 0 4px rgba(208, 96, 160, 0.5);
    }
    .npc-entry .npc-dot.item {
      background: #f0d030;
      box-shadow: 0 0 4px rgba(240, 208, 48, 0.5);
    }
    .npc-entry .npc-id {
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .npc-entry .npc-type {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 1px 5px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .npc-entry .npc-type.trainer {
      background: rgba(224, 72, 72, 0.15);
      color: var(--trainer-color);
    }
    .npc-entry .npc-type.normal {
      background: rgba(208, 96, 160, 0.15);
      color: var(--npc-color);
    }
    .npc-entry .npc-type.item {
      background: rgba(240, 208, 48, 0.15);
      color: #f0d030;
    }
    .npc-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    /* Legend */
    .legend {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .legend-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-dim);
    }
    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    /* Map stats */
    .map-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .stat-box {
      padding: 8px 10px;
      background: var(--bg-card);
      border-radius: 4px;
      text-align: center;
    }
    .stat-box .stat-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-white);
    }
    .stat-box .stat-label {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Hover tooltip */
    .tooltip {
      position: fixed;
      padding: 6px 10px;
      background: var(--bg-panel);
      border: 1px solid var(--border-active);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-bright);
      pointer-events: none;
      z-index: 200;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      max-width: 220px;
    }
    .tooltip .tt-title {
      font-weight: 600;
      color: var(--text-white);
    }
    .tooltip .tt-sub {
      color: var(--text-dim);
      font-size: 9px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-abyss); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>MAP VIEWER</h1>
    <div class="sep"></div>
    <span class="tag">CARTOGRAPHY</span>
    <span class="map-count"><span id="map-total">0</span> maps loaded</span>
    <div class="topbar-right">
      <div class="toggle-group">
        <button class="toggle-btn active" id="toggle-warps" title="Show warp points">WARPS</button>
        <button class="toggle-btn active" id="toggle-npcs" title="Show NPCs">NPCs</button>
        <button class="toggle-btn" id="toggle-grid" title="Show tile grid">GRID</button>
        <button class="toggle-btn" id="toggle-collision" title="Show collision">COLLISION</button>
      </div>
      <div class="sep"></div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoom-out" title="Zoom out">&minus;</button>
        <span class="zoom-label" id="zoom-label">3x</span>
        <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
        <button class="zoom-btn" id="zoom-fit" title="Fit to view" style="font-size:11px;margin-left:2px">FIT</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar: map list -->
    <div class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="map-search" placeholder="Search maps..." />
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </div>

    <!-- Canvas area -->
    <div class="canvas-area" id="canvas-area">
      <canvas id="map-canvas"></canvas>
    </div>

    <!-- Info panel -->
    <div class="info-panel" id="info-panel">
      <div class="info-header">
        <div class="map-name" id="info-map-name">Select a map</div>
        <div class="map-id" id="info-map-id"></div>
        <div class="map-dims" id="info-map-dims"></div>
      </div>

      <div class="info-section">
        <div class="info-section-title">STATS</div>
        <div class="map-stats" id="map-stats"></div>
      </div>

      <div class="legend">
        <div class="info-section-title" style="margin-bottom:8px">LEGEND</div>
        <div class="legend-items">
          <div class="legend-item">
            <div class="legend-swatch" style="background:var(--warp-external)"></div>
            External warp
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background:var(--warp-internal)"></div>
            Internal warp
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background:var(--trainer-color)"></div>
            Trainer
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background:var(--npc-color)"></div>
            NPC
          </div>
          <div class="legend-item">
            <div class="legend-swatch" style="background:#f0d030"></div>
            Item
          </div>
        </div>
      </div>

      <div class="info-section">
        <div class="info-section-title">WARPS (<span id="warp-count">0</span>)</div>
        <div class="warp-list" id="warp-list"></div>
      </div>

      <div class="info-section">
        <div class="info-section-title">NPCs (<span id="npc-count">0</span>)</div>
        <div class="npc-list" id="npc-list"></div>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip"></div>

  <script type="module" src="/src/mapViewer.ts"></script>
</body>
</html>
